name: Release MCP binaries
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: windows, arch: amd64, ext: .exe }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o xcontext-mcp-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./services/mcp/cmd/xcontext-mcp
      - uses: softprops/action-gh-release@v2
        with:
          files: xcontext-mcp-*
