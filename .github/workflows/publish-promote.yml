name: Publish and promote
on:
  push:
    branches: [development]
  release:
    types: [published]
permissions:
  contents: read
  id-token: write
  attestations: write
env:
  REGISTRY: ${{ secrets.GKE_REGION }}-docker.pkg.dev
  IMAGE: ${{ secrets.GKE_PROJECT }}/xcontext/xcontext
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'release' && 'production' || 'development' }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      overlay: ${{ steps.target.outputs.overlay }}
      tag: ${{ steps.target.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "overlay=production-en-in" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "overlay=development" >> "$GITHUB_OUTPUT"
            echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.target.outputs.tag }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
  promote:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: agumbe-ai/manifests-index
          ref: develop
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
      - uses: imranismail/setup-kustomize@v2
      - name: Pin immutable image digest
        working-directory: infra/k8s/xcontext/overlays/${{ needs.publish.outputs.overlay }}
        run: kustomize edit set image xcontext=${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ needs.publish.outputs.digest }}
      - name: Open GitOps promotion pull request
        env:
          GH_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          OVERLAY: ${{ needs.publish.outputs.overlay }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          branch="promote/xcontext-${OVERLAY}-${GITHUB_SHA::12}"
          git config user.name "agumbe-release-bot"
          git config user.email "release-bot@agumbe.ai"
          git switch -c "$branch"
          git add infra/k8s/xcontext
          git commit -m "chore: promote xcontext to ${OVERLAY}"
          git push origin "$branch"
          gh pr create --base develop --head "$branch" --title "chore: promote xcontext to ${OVERLAY}" --body "Pins xcontext to immutable digest \`${DIGEST}\`."
