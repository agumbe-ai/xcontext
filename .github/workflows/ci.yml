name: CI
on:
  pull_request:
  push:
    branches: [main, development]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l services)"
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Validate Claude Code plugin structure
        run: ./scripts/validate-claude-plugin.sh
      - name: Validate Cursor plugin structure
        run: ./scripts/validate-cursor-plugin.sh
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: xcontext:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xcontext
          POSTGRES_PASSWORD: xcontext
          POSTGRES_DB: xcontext
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcontext"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -run TestPostgresProductFlow -v ./services/api/internal/store
        env:
          XCONTEXT_TEST_DATABASE_URL: postgres://xcontext:xcontext@127.0.0.1:5432/xcontext?sslmode=disable
